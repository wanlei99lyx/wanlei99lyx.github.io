<header class="header">
  <nav class="nav container">
    <a href="{{ '/' | relative_url }}" class="nav-logo">
      <span class="nav-logo-text">{{ site.title }}</span>
    </a>
    <button class="nav-toggle" aria-label="菜单" id="navToggle">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <ul class="nav-links" id="navLinks">
      <li><a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>首页</a></li>
      <li><a href="{{ '/blog/' | relative_url }}" {% if page.url contains '/blog' or page.layout == 'post' %}class="active"{% endif %}>博客</a></li>
      <li><a href="{{ '/projects/' | relative_url }}" {% if page.url contains '/projects' %}class="active"{% endif %}>项目</a></li>
      <li><a href="{{ '/about/' | relative_url }}" {% if page.url contains '/about' %}class="active"{% endif %}>关于</a></li>
      <li class="nav-search-li">
        <div class="nav-search" id="navSearch">
          <svg class="nav-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <circle cx="11" cy="11" r="8"/>
            <path d="M21 21l-4.35-4.35"/>
          </svg>
          <input type="text" class="nav-search-input" id="searchInput" placeholder="搜索文章..." autocomplete="off">
          <div class="search-results" id="searchResults"></div>
        </div>
      </li>
    </ul>
  </nav>
</header>
