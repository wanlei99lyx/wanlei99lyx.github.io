title: Wlei的Ai技术分享
description: 分享AI技术、开发实践与开源项目 — 让AI学习更简单
author: Wlei
email:
avatar: /assets/images/avatar.png

# SEO
lang: zh-CN
timezone: Asia/Shanghai
url: "https://wanlei99lyx.github.io"
baseurl: ""

# Social
github_username: wanlei99lyx

# Build
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:title/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Wlei"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude
exclude:
  - README.md
  - DESIGN.md
  - PRODUCT.md
  - node_modules
  - Gemfile
  - Gemfile.lock
