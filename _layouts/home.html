---
layout: default
---

<div class="hero">
  <div class="hero-bg"></div>
  <div class="container">
    <div class="hero-content">
      <p class="hero-label">{{ site.description }}</p>
      <h1 class="hero-title">
        <span class="gradient-text">{{ site.title }}</span>
      </h1>
      <p class="hero-subtitle">
        探索 AI 前沿技术，分享开发实践，构建知识体系
      </p>
      <div class="hero-actions">
        <a href="{{ '/blog/' | relative_url }}" class="btn btn-primary">
          阅读博客
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </a>
        <a href="{{ '/about/' | relative_url }}" class="btn btn-ghost">
          关于我
        </a>
      </div>

      <div class="hero-search">
        <div class="search-box">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
            <circle cx="11" cy="11" r="8"/>
            <path d="M21 21l-4.35-4.35"/>
          </svg>
          <input type="text" class="search-input" id="heroSearch" placeholder="搜索文章、关键词..." autocomplete="off">
        </div>
        <div class="search-results" id="searchResults"></div>
      </div>
    </div>
  </div>
  <div class="hero-grid"></div>
</div>

<section class="section section-featured">
  <div class="container">
    <div class="section-header">
      <h2 class="section-title">精选文章</h2>
      <a href="{{ '/blog/' | relative_url }}" class="section-link">查看全部 →</a>
    </div>
    <div class="posts-grid" id="homeFeaturedGrid">
      {% for post in site.posts limit:6 %}
        {% include post-card.html post=post %}
      {% endfor %}
    </div>
  </div>
</section>

{% if site.posts.size > 0 %}
<script id="homePostsData" type="application/json">[
  {% for post in site.posts %}
  {% assign pv = site.data.views | where: "url", post.url | first %}
  {
    "url": "{{ post.url }}",
    "title": {{ post.title | jsonify }},
    "excerpt": {{ post.excerpt | strip_html | truncate: 120 | jsonify }},
    "date": "{{ post.date | date: "%Y-%m-%d" }}",
    "views": {{ pv.views | default: 0 }},
    "categories": [{% for cat in post.categories %}{{ cat | jsonify }}{% unless forloop.last %},{% endunless %}{% endfor %}],
    "tags": [{% for tag in post.tags limit:3 %}{{ tag | jsonify }}{% unless forloop.last %},{% endunless %}{% endfor %}]
  }{% unless forloop.last %},{% endunless %}
  {% endfor %}
]</script>
{% endif %}

<section class="section section-projects">
  <div class="container">
    <div class="section-header">
      <h2 class="section-title">开源项目</h2>
      <a href="{{ '/projects/' | relative_url }}" class="section-link">查看全部 →</a>
    </div>
    <div class="projects-grid" data-projects="3"></div>
  </div>
</section>

<script src="{{ '/assets/js/projects.js' | relative_url }}"></script>
<script src="{{ '/assets/js/home.js' | relative_url }}"></script>
