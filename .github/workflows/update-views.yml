name: Update Busuanzi Views

on:
  schedule:
    - cron: '7 2 * * *'   # daily at 10:07 AM CST
  workflow_dispatch:       # manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Fetch page views from Busuanzi
        run: |
          cat > /tmp/fetch_views.py << 'PYEOF'
          import json, urllib.request, re, os

          REPO = "wanlei99lyx"
          SITE = f"https://{REPO}.github.io"
          posts = [
              "/2026/07/top-10-claude-code-skills/",
              "/2026/07/ai-news-july-2026/",
              "/2026/07/chatgpt-gpt56-update/",
              "/2026/07/grok45-model-update/",
              "/2026/07/ai-agent-mcp-skill-guide/",
              "/2026/07/ai-tools-guide/",
          ]

          result = []
          for url in posts:
              req = urllib.request.Request(
                  "https://busuanzi.ibruce.info/busuanzi?jsonpCallback=cb",
                  headers={"Referer": SITE + url}
              )
              try:
                  resp = urllib.request.urlopen(req, timeout=10).read().decode()
                  m = re.search(r'"page_pv":(\d+)', resp)
                  pv = int(m.group(1)) if m else 0
              except:
                  pv = 0
              result.append({"url": url, "views": pv})
              print(f"{url} → {pv}")

          # Sort by views desc
          result.sort(key=lambda x: x["views"], reverse=True)

          with open("_data/views.json", "w", encoding="utf-8") as f:
              json.dump(result, f, ensure_ascii=False, indent=2)
          PYEOF
          python3 /tmp/fetch_views.py

      - name: Commit updated views
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/views.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update Busuanzi view counts"
            git push
          fi
